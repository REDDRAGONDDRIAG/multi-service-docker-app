version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-day06
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: devops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-compose/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:
        aliases:
          - database
          - postgres-server
          - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-day06
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:
        aliases:
          - cache
          - redis-server
    restart: unless-stopped

  auth-service:
    build:
      context: ../day-02/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-day06
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: dev_secret_key_prod
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: devops
      DATABASE_PASSWORD: devops123
      DATABASE_NAME: devops_db
      REDIS_URL: redis://cache:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  product-service:
    build:
      context: ../day-03/services/product-service
      dockerfile: Dockerfile
    container_name: product-day06
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: devops
      DATABASE_PASSWORD: devops123
      DATABASE_NAME: devops_db
      DATABASE_URL: postgresql://devops:devops123@postgres:5432/devops_db
      REDIS_URL: redis://cache:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  order-service:
    build:
      context: ../day-04/services/order-service
      dockerfile: Dockerfile
    container_name: order-day06
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: devops
      DATABASE_PASSWORD: devops123
      DATABASE_NAME: devops_db
      REDIS_URL: redis://cache:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-day06
    ports:
      - "80:80"
    volumes:
      - ./docker-compose/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
    name: day06-backend
  frontend:
    driver: bridge
    name: day06-frontend
