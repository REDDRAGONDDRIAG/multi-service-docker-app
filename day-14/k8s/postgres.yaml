apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: devops-app
data:
  init.sql: |
    CREATE TABLE users (
      id SERIAL PRIMARY KEY,
      username VARCHAR(255) UNIQUE,
      email VARCHAR(255) UNIQUE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE products (
      id SERIAL PRIMARY KEY,
      name VARCHAR(255),
      price DECIMAL(10,2),
      stock INT DEFAULT 0
    );
    CREATE TABLE orders (
      id SERIAL PRIMARY KEY,
      user_id INT REFERENCES users(id),
      total DECIMAL(10,2),
      status VARCHAR(50) DEFAULT 'pending'
    );
    INSERT INTO products VALUES (1, 'DevOps Course', 99.99, 100);
    INSERT INTO products VALUES (2, 'Kubernetes', 49.99, 50);
    INSERT INTO products VALUES (3, 'Docker Guide', 79.99, 75);

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: devops
        - name: POSTGRES_PASSWORD
          value: devops123
        - name: POSTGRES_DB
          value: devops_db
        volumeMounts:
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U devops
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: init
        configMap:
          name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: devops-app
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
