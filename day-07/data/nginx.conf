events { worker_connections 1024; }
http {
    upstream auth { server auth-service:3001; }
    upstream product { server product-service:3002; }
    upstream order { server order-service:3003; }

    server {
        listen 80;
        location /auth/ { proxy_pass http://auth/; }
        location /products/ { proxy_pass http://product/; }
        location /orders/ { proxy_pass http://order/; }
        location /health { return 200 "healthy\n"; }
    }
}
