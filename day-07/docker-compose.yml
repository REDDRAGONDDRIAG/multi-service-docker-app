version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-day07
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: devops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:
        aliases:
          - database
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-day07
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
      - ./data/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:
        aliases:
          - cache
    restart: unless-stopped

  auth-service:
    build:
      context: ../day-02/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-day07
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: dev_secret
      DATABASE_HOST: postgres
      REDIS_URL: redis://cache:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  product-service:
    build:
      context: ../day-03/services/product-service
      dockerfile: Dockerfile
    container_name: product-day07
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_HOST: postgres
      REDIS_URL: redis://cache:6379
    volumes:
      - ./data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  order-service:
    build:
      context: ../day-04/services/order-service
      dockerfile: Dockerfile
    container_name: order-day07
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_HOST: postgres
      REDIS_URL: redis://cache:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-day07
    ports:
      - "80:80"
    volumes:
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
