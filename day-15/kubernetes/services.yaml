apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: multi-service
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
---
