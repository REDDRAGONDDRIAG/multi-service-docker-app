apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: multi-service
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  DATABASE_HOST: "postgres-service"
  REDIS_HOST: "redis-service"
  FRONTEND_PORT: "3000"
  BACKEND_PORT: "5000"
  API_TIMEOUT: "30000"
  CACHE_TTL: "3600"
  MAX_CONNECTIONS: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: multi-service
data:
  nginx.conf: |
    upstream backend {
      server backend-service:5000;
    }
    upstream frontend {
      server frontend-service:3000;
    }
    server {
      listen 80;
      server_name _;
      
      location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
      
      location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
