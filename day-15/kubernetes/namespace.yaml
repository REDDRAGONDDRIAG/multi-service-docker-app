apiVersion: v1
kind: Namespace
metadata:
  name: multi-service
  labels:
    app: production
    environment: advanced-k8s
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: multi-service
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: compute-limit
  namespace: multi-service
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container
