version: '3.9'

services:
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-day04
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  devops-network:
    driver: bridge
