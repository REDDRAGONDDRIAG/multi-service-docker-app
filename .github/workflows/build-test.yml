name: Build & Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ========================================
  # SETUP
  # ========================================
  setup:
    runs-on: ubuntu-latest
    name: Setup & Lint
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

  # ========================================
  # BUILD SERVICES
  # ========================================
  build:
    runs-on: ubuntu-latest
    name: Build Services
    needs: setup
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Build Auth Service
      run: |
        cd day-09/services/auth-service-secure
        npm install 2>/dev/null || true
        echo "✅ Auth service built"

    - name: Build Product Service
      run: |
        cd day-09/services/product-service-secure
        pip install -q -r requirements.txt 2>/dev/null || true
        echo "✅ Product service built"

    - name: Build Order Service
      run: |
        cd day-09/services/order-service-secure
        go build -o order-service . 2>/dev/null || true
        echo "✅ Order service built"

  # ========================================
  # BUILD DOCKER IMAGES
  # ========================================
  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Auth Image
      uses: docker/build-push-action@v4
      with:
        context: ./day-09/services/auth-service-secure
        file: ./day-09/services/auth-service-secure/Dockerfile.secure
        push: false
        tags: auth:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Product Image
      uses: docker/build-push-action@v4
      with:
        context: ./day-09/services/product-service-secure
        file: ./day-09/services/product-service-secure/Dockerfile.secure
        push: false
        tags: product:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Order Image
      uses: docker/build-push-action@v4
      with:
        context: ./day-09/services/order-service-secure
        file: ./day-09/services/order-service-secure/Dockerfile.secure
        push: false
        tags: order:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ========================================
  # FINAL SUMMARY
  # ========================================
  summary:
    runs-on: ubuntu-latest
    name: Build Summary
    needs: [build, docker-build]
    if: always()

    steps:
    - name: Build Status
      run: |
        echo "🎉 BUILD PIPELINE SUMMARY"
        echo "========================="
        echo "Setup: ${{ needs.setup.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "Docker: ${{ needs.docker-build.result }}"
        echo ""
        if [ "${{ needs.docker-build.result }}" = "success" ]; then
          echo "✅ All builds successful!"
        else
          echo "❌ Build failed"
          exit 1
        fi
