name: Build & Push Docker Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: 'auth-service'
            context: './day-09/services/auth-service-secure'
            dockerfile: './day-09/services/auth-service-secure/Dockerfile.secure'
          - name: 'product-service'
            context: './day-09/services/product-service-secure'
            dockerfile: './day-09/services/product-service-secure/Dockerfile.secure'
          - name: 'order-service'
            context: './day-09/services/order-service-secure'
            dockerfile: './day-09/services/order-service-secure/Dockerfile.secure'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push ${{ matrix.service.name }}
      uses: docker/build-push-action@v4
      with:
        context: ${{ matrix.service.context }}
        file: ${{ matrix.service.dockerfile }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Notify
  notify:
    runs-on: ubuntu-latest
    needs: push
    if: always()
    
    steps:
    - name: Check status
      run: |
        if [ "${{ needs.push.result }}" = "success" ]; then
          echo "✅ Images pushed to registry"
          echo "📦 Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        else
          echo "❌ Push failed"
          exit 1
        fi
